<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu | Ristorante</title>
    
    <!-- Google Fonts: Playfair Display (Titoli) e Lato (Testi) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Emozionale -->
    <header class="hero">
        <div class="video-overlay"></div>
        <!-- IMPORTANTE: playsinline è cruciale per i video su iPhone/iOS -->
        <video autoplay muted loop playsinline class="hero-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-fire-in-a-wood-oven-4265-large.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1 class="logo">L'Essenza</h1>
            <p class="subtitle">Cucina & Fuoco</p>
        </div>
    </header>

    <!-- Navigazione Sticky -->
    <nav class="category-nav" id="categoryNav">
        <!-- Generato da JS -->
    </nav>

    <!-- Contenitore Principale Menu -->
    <main class="menu-container" id="menuContainer">
        <!-- Generato da JS -->
    </main>

    <script src="script.js"></script>
</body>
</html>
